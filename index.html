<!DOCTYPE html>
<html lang="en">
    <script src="./hydra-2.1.5-pro.js"></script>
<head>
    <meta charset="UTF-8">
    <!-- 添加到主屏幕后，全屏显示 -->
    <meta name="apple-touch-fullscreen" content="YES" />
    <meta name="format-detection" content="telephone=no" />
    <!-- iphone 运行在全屏模式 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">    <title>js调用Demo</title>
</head>
<h2>js调用自定义插件Demo</h2>
<body>
    <div class="btn" onclick="Click('jumpUrl')">跳转测试</div>
    <div class="btn" onclick="Click('location')">获取地理位置（旧）</div>
    <div class="btn" onclick="Click('locationInfo')">获取地理位置信息（新）</div>
    <div class="btn" onclick="Click('takePhoto')">拍照</div>
    <div class="btn" onclick="Click('chosePhotos')">选择图片</div>
    <div class="btn" onclick="Click('scan')"> 扫码 </div>
    <div class="btn" onclick="Click('open')"> 外部打开 </div>
    <!-- <div class="btn" onclick="Click('startFos')"> 活体检测 </div>
    <div class="other">
        <text>用户名</text>
        <input type="text" id="userName" placeholder="请输入用户名">
    </div>
    <div class="other">
        <text>签名数据</text>
        <input type="text" id="signData" placeholder="请输入签名数据">
    </div>
    <div class="btn" onclick="Click('authOperation')"> 验证 </div> -->
    <div class="other">
        <text>fvtoken</text>
        <input type="text" id="fvtoken" placeholder="人脸 fvtoken（后端下发）">
    </div>
    <div class="other">
        <text>key</text>
        <input type="text" id="faceKey" placeholder="业务 key（可空）">
    </div>
    <div class="other">
        <text>type</text>
        <input type="text" id="faceType" placeholder="认证类型 type（可空）">
    </div>
    <div class="btn" onclick="Click('faceConfirm')"> 人脸认证（faceConfirmParams） </div>
    <div id="faceResult" style="width:80vw;margin-top:12px;word-break:break-all;font-size:14px;color:#333;"></div>
    <div class="btn" onclick="Click('isNetworkConnected')"> 是否有网络（isNetworkConnected） </div>
    <div id="networkResult" style="width:80vw;margin-top:12px;word-break:break-all;font-size:14px;color:#333;"></div>
    <img id="img" src="" style="width: 80vw;" >
    <div id="imgs"></div>
</body>
<script>

    function Click(e){
        if (e === 'jumpUrl') {
            croods.customPlugin({
                action: 'UtilsPlugin.openOtherView',
                params: {
                    url:'https://www.baidu.com'
                },
                success: function (res) {
                },
                fail: function (msg) {
                    console.log(msg)
                }
            })
        }
        if (e == 'location') {
            // 获取基础经纬度信息，逆地理位置编码信息可能空白。WGS84坐标系
            croods.customPlugin({
                action: 'MediaPlugin.getLocation',
                params: {

                },
                success: function (res) {
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                }
            })
        }
        if (e == 'locationInfo') {
            // 速度稍慢，获取经纬度信息，以及逆地理位置编码信息。GCJ02坐标系
            croods.customPlugin({
                action: 'MediaPlugin.getLocationInfo',
                params: {

                },
                success: function (res) {
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                }
            })
        }
        if (e == 'takePhoto') {
            // 拍照
            croods.customPlugin({
                action: 'MediaPlugin.openCamera',
                params: {
                    quality:'high',//照片质量，可选值：low, normal, high, origin
                },
                success: function (res) {
                    let imgObj =  res[0];
                    document.getElementById('img').src = 'data:' + imgObj.type + ';base64,' + imgObj.file;
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                }
            })
        }
        if (e == 'chosePhotos') {
            // 选择图片
            croods.customPlugin({
                action: 'MediaPlugin.choosePhotosFromLibrary',
                params: {
                    count: 4, // 图片数量，最大 9
                    quality:'high' // 图片质量，可选值：low, normal, high, origin
                },
                success: function (res) {
                    for (let i = 0; i < res.length; i++) {
                        const imgObj = res[i];
                        document.getElementById('imgs').innerHTML += '<img src="data:' + imgObj.type + ';base64,' + imgObj.file + '" style="width: 20vw;">'
                    }
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                }
            })
        }
        if (e == 'scan') {
            // 扫码
            croods.customPlugin({
                action: 'MediaPlugin.scan',
                params: {
                },
                success: function (res) {
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                }
            })
        }
        if (e == 'open') {
            // 扫码
            croods.customPlugin({
                action: 'NavigationPlugin.openApp',
                params: {
                    url:'https://www.baidu.com'
                },
                success: function (res) {
                },
                fail: function (msg) {
                    console.log(msg)
                }
            })
        }
        if (e == 'isReged') {
            // 判断是否注册
            let userName = document.getElementById('userName').value;
            if (!userName) {
                alert('请输入用户名');
                return;
            }
            croods.customPlugin({
                action: 'DirectPlugin.isReged',
                params: {
                    userName: userName
                },
                success: function (res) {
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                    alert('失败: ' + JSON.stringify(msg))
                }
            })
        }
        if (e == 'regOperation') {
            // 注册
            let userName = document.getElementById('userName').value;
            if (!userName) {
                alert('请输入用户名');
                return;
            }
            croods.customPlugin({
                action: 'DirectPlugin.regOperation',
                params: {
                    userName: userName
                },
                success: function (res) {
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                    alert('失败: ' + JSON.stringify(msg))
                }
            })
        }
        if (e == 'authOperation') {
            // 验证
            let userName = document.getElementById('userName').value;
            let signData = document.getElementById('signData').value;
            if (!userName) {
                alert('请输入用户名');
                return;
            }
            if (!signData) {
                alert('请输入签名数据');
                return;
            }
            croods.customPlugin({
                action: 'DirectPlugin.authOperation',
                params: {
                    userName: userName,
                    signData: signData
                },
                success: function (res) {
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                    alert('失败: ' + JSON.stringify(msg))
                }
            })
        }
        if (e == 'startFos') {
            // 活体检测
            croods.customPlugin({
                action: 'DirectPlugin.startFos',
                params: {},
                success: function (res) {
                    alert(JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                    alert('失败: ' + JSON.stringify(msg))
                }
            })
        }
        if (e == 'faceConfirm') {
            // 人脸认证插件验证。
            // 注意：原生成功/失败/取消三态都走 success 回调（返回码恒为 10000 IFLY_OK），
            // 必须靠 res.faceState 区分，不能用 fail 分支判断认证结果。
            //   res.faceState === 'success' → 认证成功（res 里还带后端下发的 accessToken 等业务字段）
            //   res.faceState === 'failed'  → 认证失败（认证方式不可用 / 分流接口异常）
            //   res.faceState === 'cancel'  → 用户手动返回取消
            // 活检失败 / 校验不过等「可重试」场景不回调，用户重试成功给 success、放弃返回给 cancel。
            croods.customPlugin({
                action: 'WstFacePlugin.faceConfirmParams',
                params: {
                    fvtoken: document.getElementById('fvtoken').value,
                    key: document.getElementById('faceKey').value,
                    type: document.getElementById('faceType').value
                },
                success: function (res) {
                    console.log(JSON.stringify(res));
                    var state = res && res.faceState;
                    var tip;
                    if (state === 'success') {
                        tip = '✅ 认证成功';
                    } else if (state === 'failed') {
                        tip = '❌ 认证失败';
                    } else if (state === 'cancel') {
                        tip = '⚠️ 用户取消';
                    } else {
                        tip = '❓ 未知状态（无 faceState）';
                    }
                    document.getElementById('faceResult').innerHTML =
                        '<b>' + tip + '</b><br>faceState: ' + JSON.stringify(state) +
                        '<br>完整回调: ' + JSON.stringify(res);
                    alert(tip + '\n' + JSON.stringify(res));
                },
                fail: function (msg) {
                    // 正常情况下人脸插件不会走这里；走到这里通常是插件未注册 / 参数错误。
                    console.log(msg)
                    document.getElementById('faceResult').innerHTML =
                        '<b style="color:#c00">调用失败</b><br>' + JSON.stringify(msg);
                    alert('调用失败: ' + JSON.stringify(msg))
                }
            })
        }
        if (e == 'isNetworkConnected') {
            // 是否有网络：res.result === 1 有网络，0 无网络
            croods.customPlugin({
                action: 'UtilsPlugin.isNetworkConnected',
                params: {},
                success: function (res) {
                    var tip = (res && res.result === 1) ? '✅ 有网络' : '❌ 无网络';
                    document.getElementById('networkResult').innerHTML =
                        '<b>' + tip + '</b><br>完整回调: ' + JSON.stringify(res);
                    alert(tip + '\n' + JSON.stringify(res))
                },
                fail: function (msg) {
                    console.log(msg)
                    document.getElementById('networkResult').innerHTML =
                        '<b style="color:#c00">调用失败</b><br>' + JSON.stringify(msg);
                    alert('调用失败: ' + JSON.stringify(msg))
                }
            })
        }
    }


</script>
<style>
    body {
        padding: 10vw;
    }
    .btn {
        width: 80vw;
        height: 50px;
        border-radius: 10px;
        background: #096AE6;
        color: #fff;
        line-height: 50px;
        text-align: center;
        font-size: 20px;
        margin-top: 20px;
    }
    .other{
        width: 80vw;
        display: flex;
        padding: 10px 0;
        align-items: start;
        height: 40px;
    }
    .other  input {
        width: 55vw;
        margin-left: auto;
    }
    .other text{
        width: 20vw;
        text-align: justify;
    }
    .other text::after{
        width: 100%;
        content: '';
        display: inline-block;
    }
</style>


</html>
